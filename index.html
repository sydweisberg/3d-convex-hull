<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Convex Hull Collision Visualizer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1 id="title">˖⟡ 3D Convex Hull Collider ⟡˖</h1>

<div id="ui">
  <div class="row" id="edit-row">
    <div id="edit-controls" style="display:flex; align-items:center; gap:14px;">
      <div class="coord-group"><label>x</label><input id="x" type="number" value="0"></div>
      <div class="coord-group"><label>y</label><input id="y" type="number" value="0"></div>
      <div class="coord-group"><label>z</label><input id="z" type="number" value="0"></div>
      <button id="addBtn">+ Add Point</button>
    </div>
    <button id="toggleEdit" class="edit-on">Collision Mode</button>
    <button id="resetView">Reset View</button>
    <button id="testBtn">Sample Tetrahedrons</button>
    <div style="flex:1"></div>
    <button id="toggleSide" class="active-l">Active: LEFT</button>
  </div>

  <div class="row">
    <div id="collision-status" class="idle">—</div>
  </div>

  <div id="slider-row" style="display:none;">
    <label>Separation</label>
    <input id="overlapSlider" type="range" min="0" max="1" step="0.005" value="0">
  </div>

  <div id="drag-hint" style="display:none;">
    LEFT-DRAG a shape to move it · RIGHT-DRAG to orbit · SCROLL to zoom
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="app.js"></script>

</body>
</html>
