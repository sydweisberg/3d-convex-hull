<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>3D Convex Hull Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="ui">
  <button id="toggleSide">Active: LEFT</button>
  <input id="x" placeholder="x" type="number" step="0.1">
  <input id="y" placeholder="y" type="number" step="0.1">
  <input id="z" placeholder="z" type="number" step="0.1">
  <button id="addBtn">Add Point</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="app.js"></script>

</body>
</html>
